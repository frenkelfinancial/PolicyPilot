# Per-function deploy settings. Without this file, `supabase functions
# deploy <name>` silently resets every function to the platform default
# (verify_jwt = true) unless --no-verify-jwt is passed by hand on every
# single deploy — which is exactly how stripe-webhook, telnyx-call-status,
# and both wallet cron functions went dark for ~5 hours on 2026-07-09: a
# batch redeploy omitted the flag, the Supabase gateway started rejecting
# every request from Stripe/Telnyx/pg_cron with 401 UNAUTHORIZED_NO_AUTH_HEADER
# before our own code ever ran, and nothing in the deploy output said so.
#
# These four functions are called by something that is NOT a Supabase-
# signed JWT (Stripe's Stripe-Signature header, Telnyx's unauthenticated
# webhook POST, or pg_cron's custom WALLET_CRON_SECRET bearer token) — the
# platform gate must be off, and each function does its own internal auth
# check instead (Stripe signature verification, or a WALLET_CRON_SECRET /
# service-role comparison). Every other function in this project is called
# by the authenticated browser client with the user's real session JWT, so
# the platform default (verify_jwt = true) is correct and desired there —
# do not add functions here unless their caller genuinely cannot supply a
# Supabase JWT.

[functions.stripe-webhook]
verify_jwt = false

[functions.telnyx-call-status]
verify_jwt = false

[functions.wallet-renew-numbers]
verify_jwt = false

[functions.wallet-low-balance-notify]
verify_jwt = false

# Phase 2 (messaging): same rationale as above. messaging-delivery-webhook
# and messaging-inbound-webhook are called by Telnyx (Ed25519-signed, not a
# Supabase JWT); messaging-email-inbound-webhook is called by Resend
# (Svix-signed); messaging-timeout-sweep and a2p-status-poll are pg_cron
# jobs authenticated with WALLET_CRON_SECRET, same as the two wallet cron
# functions above. messaging-send-sms/mms/email and a2p-register are called
# by the authenticated browser client with the user's real session JWT, so
# they correctly use the platform default (verify_jwt = true) and are NOT
# listed here.
[functions.messaging-delivery-webhook]
verify_jwt = false

[functions.messaging-inbound-webhook]
verify_jwt = false

[functions.messaging-email-inbound-webhook]
verify_jwt = false

[functions.messaging-timeout-sweep]
verify_jwt = false

[functions.a2p-status-poll]
verify_jwt = false

# Phase 2 re-scope (PROMPT_07 §4): messaging-broadcast-run is invoked two
# ways, neither of which supplies a Supabase user JWT — a pg_cron sweep
# (no body, drains every queued/sending broadcast) and a self-invoked
# fetch from messaging-broadcast-create for small lists. Both authenticate
# with the same WALLET_CRON_SECRET bearer token the function checks
# internally. messaging-broadcast-create, messaging-recipients-import, and
# a2p-assign-number ARE called by the authenticated browser client (they
# call sbAuth.auth.getUser()), so they correctly use the platform default
# and are NOT listed here.
[functions.messaging-broadcast-run]
verify_jwt = false

# summary-unsubscribe: one-click unsubscribe link clicked by email recipients
# who are not logged in (no Supabase JWT available) — same rationale as the
# webhook functions above. monthly-summary is NOT listed here: it's invoked
# by pg_cron passing the service-role key as the Bearer token, which IS a
# valid Supabase-signed JWT, so the platform default (verify_jwt = true) is
# correct and desired for it.
[functions.summary-unsubscribe]
verify_jwt = false

# email-pipeline: the autonomous carrier-mail orchestrator, invoked only by
# pg_cron twice daily (see supabase/schedule_email_pipeline.sql) with a
# dedicated EMAIL_PIPELINE_CRON_SECRET bearer token — not a Supabase JWT — so
# the platform gate must be off and the function checks the secret internally,
# same as the wallet/messaging cron functions above. The in-app "Sync & parse"
# button does NOT call this function; it invokes gmail-sync / parse-email /
# match-events directly with the user's session JWT, and those keep the
# platform default (verify_jwt = true).
[functions.email-pipeline]
verify_jwt = false
