  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

>\n\n  <!-- ===== Main ===== -->\n  <div style=\"margin-left:68px;min-height:100vh;display:flex;flex-direction:column\">\n    <div style=\"height:50px;background:#FFFFFF;border-bottom:1px solid #E4E0DA;display:flex;align-items:center;gap:12px;padding:0 24px;box-sizing:border-box\">\n      <div style=\"font:600 15px 'Spline Sans',sans-serif;color:#0F1D3D\">Summary<\u002Fdiv>\n      <div style=\"margin-left:auto;display:flex;align-items:center;gap:12px\">\n        <span style=\"font:600 11px 'Spline Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#948C7F;background:#FAF8F5;border:1px solid #E4E0DA;border-radius:6px;padding:2px 8px\">{{ tierLabel }}<\u002Fspan>\n        <span style=\"font:400 11.5px 'Spline Sans Mono',monospace;color:#948C7F\">{{ todayLabel }}<\u002Fspan>\n        <div style=\"width:26px;height:26px;background:#0F1D3D;border-radius:6px;display:flex;align-items:center;justify-content:center;font:600 10.5px 'Spline Sans',sans-serif;color:#FFFFFF\">MR<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:20px 24px;display:flex;flex-direction:column;gap:16px;max-width:1392px;box-sizing:border-box;width:100%\">\n\n      <!-- Period toggle -->\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <button sc-camel-on-click=\"{{ setDaily }}\" style=\"padding:6px 10px;font:500 12.5px 'Spline Sans',sans-serif;background:#FFFFFF;border:1px solid {{ cDb }};color:{{ cDc }};border-radius:6px;cursor:pointer\" style-hover=\"border-color:#B8CCEE\">Daily<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ setWeekly }}\" style=\"padding:6px 10px;font:500 12.5px 'Spline Sans',sans-serif;background:#FFFFFF;border:1px solid {{ cWb }};color:{{ cWc }};border-radius:6px;cursor:pointer\" style-hover=\"border-color:#B8CCEE\">Weekly<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ setMonthly }}\" style=\"padding:6px 10px;font:500 12.5px 'Spline Sans',sans-serif;background:#FFFFFF;border:1px solid {{ cMb }};color:{{ cMc }};border-radius:6px;cursor:pointer\" style-hover=\"border-color:#B8CCEE\">Monthly<\u002Fbutton>\n        <span style=\"margin-left:auto;font:400 11.5px 'Spline Sans Mono',monospace;color:#948C7F\">{{ periodCaption }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- KPI row -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:13px 16px\">\n          <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Policies written<\u002Fdiv>\n          <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ kPolicies }}<\u002Fdiv>\n          <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">submitted this period<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:13px 16px\">\n          <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Total AP submitted<\u002Fdiv>\n          <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ kAP }}<\u002Fdiv>\n          <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">annualized premium<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:13px 16px\">\n          <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Est. commission<\u002Fdiv>\n          <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ kComm }}<\u002Fdiv>\n          <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">AP × comm% × 75% advance<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:13px 16px\">\n          <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Avg premium<\u002Fdiv>\n          <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ kAvgPrem }}<\u002Fdiv>\n          <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">monthly, per policy<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Calling stats + Smart Goal Hub -->\n      <div style=\"display:grid;grid-template-columns:1.8fr 1fr;gap:16px\">\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:12px\">\n            <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Calling stats<\u002Fdiv>\n            <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">{{ periodTag }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Total dials<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ dials }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">dialer + logged calls<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Call time<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ callTime }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">total talk time<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Contacts<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ contacts }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">{{ contactRate }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Call-to-close<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ ratioBig }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">{{ ratioSub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:8px\">\n            <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Monthly AP goal<\u002Fdiv>\n            <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">Calendar month<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:16px\">\n            <div style=\"position:relative;width:112px;height:112px;flex-shrink:0\">\n              <svg width=\"112\" height=\"112\" sc-camel-view-box=\"0 0 128 128\">\n                <circle cx=\"64\" cy=\"64\" r=\"56\" fill=\"none\" stroke=\"#F0EDE7\" stroke-width=\"10\"><\u002Fcircle>\n                <circle cx=\"64\" cy=\"64\" r=\"56\" fill=\"none\" stroke=\"#3A73C9\" stroke-width=\"10\" stroke-linecap=\"round\" stroke-dasharray=\"{{ goalDash }}\" transform=\"rotate(-90 64 64)\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px\">\n                <span style=\"font:600 18px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ goalPctLabel }}<\u002Fspan>\n                <span style=\"font:400 9.5px 'Spline Sans',sans-serif;color:#948C7F\">of goal<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px;min-width:0\">\n              <div style=\"font:600 15px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ goalAPLabel }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">of {{ goalTargetLabel }} goal<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#3B372F\">{{ goalDays }} days left · <span style=\"font-family:'Spline Sans Mono',monospace\">{{ goalNeed }}<\u002Fspan>/day to hit it<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Status breakdown + Top carriers -->\n      <div style=\"display:grid;grid-template-columns:1.8fr 1fr;gap:16px\">\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:12px\">\n            <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Status breakdown<\u002Fdiv>\n            <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">click a status to open the Policy Tracker<\u002Fspan>\n            <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">{{ periodTag }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasStatus }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;height:10px;border-radius:6px;overflow:hidden;background:#F0EDE7\">\n              <sc-for list=\"{{ statusSegs }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div title=\"{{ s.title }}\" style=\"width:{{ s.w }}%;background:{{ s.color }}\"><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:12px\">\n              <sc-for list=\"{{ statusPills }}\" as=\"p\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:6px;cursor:pointer\" title=\"Open in Policy Tracker\">\n                  <span style=\"font:600 11px 'Spline Sans',sans-serif;color:{{ p.fg }};background:{{ p.bg }};padding:2px 8px;border-radius:6px\">{{ p.label }}<\u002Fspan>\n                  <span style=\"font:600 12px 'Spline Sans Mono',monospace;color:#3B372F\">{{ p.count }}<\u002Fspan>\n                  <span style=\"font:400 10.5px 'Spline Sans Mono',monospace;color:#B0A99C\">{{ p.pct }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noStatus }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">No policies this period yet.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:6px\">\n            <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Top carriers by AP<\u002Fdiv>\n            <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">{{ periodTag }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasTop }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ topCarriers }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0EDE7\">\n                <span style=\"font:400 10.5px 'Spline Sans Mono',monospace;color:#B0A99C;width:12px\">{{ c.i }}<\u002Fspan>\n                <span style=\"font:500 12.5px 'Spline Sans',sans-serif;color:#0F1D3D\">{{ c.name }}<\u002Fspan>\n                <span style=\"margin-left:auto;font:600 12px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ c.ap }}<\u002Fspan>\n                <span style=\"font:400 10.5px 'Spline Sans Mono',monospace;color:#B0A99C;width:34px;text-align:right\">{{ c.pct }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noTop }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">No carrier production this period.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ================= PRO + LEADER ================= -->\n      <sc-if value=\"{{ proReal }}\" hint-placeholder-val=\"{{ true }}\">\n\n        <!-- Income Reality -->\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:12px\">\n            <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Income reality<\u002Fdiv>\n            <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">earned − exposed, plus what the book pays as-earned<\u002Fspan>\n            <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">Book-wide<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Net commission<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:{{ irNetColor }};margin-top:6px\">{{ irNet }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">est. {{ irEarned }} earned − {{ irExposed }} exposed<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Chargeback exposure<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#B3261E;margin-top:6px\">{{ irExposed }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">{{ irAtRisk }} policies in the 9-mo window<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">12-mo renewal projection<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ irRenewal }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">est. 5% as-earned on in-force AP<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">In-force AP<\u002Fdiv>\n              <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:6px;white-space:nowrap\">{{ irInForce }}<\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:2px\">issued + paid, book-wide<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Earn-down + dial efficiency + term radar -->\n        <div style=\"display:grid;grid-template-columns:1.7fr .85fr .85fr;gap:16px\">\n          <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n            <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:10px\">\n              <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Chargeback earn-down<\u002Fdiv>\n              <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">at-risk advance clearing month by month<\u002Fspan>\n              <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">Book-wide<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasED }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;align-items:flex-end;gap:8px;height:128px\">\n                <sc-for list=\"{{ edBars }}\" as=\"b\" hint-placeholder-count=\"9\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0\">\n                    <span style=\"font:400 10px 'Spline Sans Mono',monospace;color:#6B6459\">{{ b.amt }}<\u002Fspan>\n                    <div style=\"width:100%;height:{{ b.h }}px;background:{{ b.color }};border-radius:3px 3px 0 0\"><\u002Fdiv>\n                    <span style=\"font:400 10px 'Spline Sans Mono',monospace;color:#948C7F\">{{ b.m }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;margin-top:10px;border-top:1px solid #F0EDE7;padding-top:8px\">est. <span style=\"font:600 12px 'Spline Sans Mono',monospace;color:#B3261E\">{{ edTotal }}<\u002Fspan> still at risk across {{ irAtRisk }} lapsed policies<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noED }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">No at-risk advances — nothing in the 9-month window.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n            <div style=\"display:flex;align-items:baseline;margin-bottom:12px\">\n              <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Dial efficiency<\u002Fdiv>\n              <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">{{ periodTag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div>\n                <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Est. $ per dial<\u002Fdiv>\n                <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:4px;white-space:nowrap\">{{ perDial }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Est. $ per contact<\u002Fdiv>\n                <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:4px;white-space:nowrap\">{{ perContact }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;border-top:1px solid #F0EDE7;padding-top:8px\">period est. commission ÷ dials / contacts<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n            <div style=\"display:flex;align-items:baseline;margin-bottom:12px\">\n              <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Term conversion radar<\u002Fdiv>\n              <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">Book-wide<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasRadar }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:12px\">\n                <div>\n                  <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Deadlines within 90 days<\u002Fdiv>\n                  <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:4px;white-space:nowrap\">{{ radarCount }} <span style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F\">policies<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Convertible AP<\u002Fdiv>\n                  <div style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:4px;white-space:nowrap\">{{ radarAP }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F;border-top:1px solid #F0EDE7;padding-top:8px\">term policies with a conversion deadline coming up<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noRadar }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">No conversion deadlines in the next 90 days.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Pipeline funnel -->\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">\n            <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Pipeline funnel<\u002Fdiv>\n            <span style=\"font:600 11px 'Spline Sans',sans-serif;color:#1B7A43;background:#E4F2E9;padding:2px 8px;border-radius:6px\">Placement {{ placement }}<\u002Fspan>\n            <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">{{ periodTag }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasFunnel }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;gap:4px\">\n              <sc-for list=\"{{ funnelSegs }}\" as=\"s\" hint-placeholder-count=\"5\">\n                <div style=\"flex-grow:{{ s.grow }};flex-basis:0;min-width:52px;background:{{ s.bg }};border-radius:6px;padding:9px 12px\">\n                  <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#948C7F\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"font:600 15px 'Spline Sans Mono',monospace;color:#0F1D3D;margin-top:2px\">{{ s.count }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noFunnel }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">Nothing submitted this period yet.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- Carrier mix + persistency + product mix -->\n        <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:16px\">\n          <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n            <div style=\"display:flex;align-items:baseline;margin-bottom:8px\">\n              <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Carrier mix<\u002Fdiv>\n              <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">{{ periodTag }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasDonut }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;align-items:center;gap:14px\">\n                <div style=\"position:relative;width:116px;height:116px;flex-shrink:0\">\n                  <svg width=\"116\" height=\"116\" sc-camel-view-box=\"0 0 120 120\">\n                    <sc-for list=\"{{ donutSegs }}\" as=\"g\" hint-placeholder-count=\"5\">\n                      <circle cx=\"60\" cy=\"60\" r=\"46\" fill=\"none\" stroke=\"{{ g.color }}\" stroke-width=\"14\" stroke-dasharray=\"{{ g.dash }}\" stroke-dashoffset=\"{{ g.off }}\" transform=\"rotate(-90 60 60)\"><\u002Fcircle>\n                    <\u002Fsc-for>\n                  <\u002Fsvg>\n                  <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px\">\n                    <span style=\"font:600 13px 'Spline Sans Mono',monospace;color:#0F1D3D;white-space:nowrap\">{{ donutTotal }}<\u002Fspan>\n                    <span style=\"font:400 9px 'Spline Sans',sans-serif;color:#948C7F\">total AP<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:5px;min-width:0;flex:1\">\n                  <sc-for list=\"{{ donutLegend }}\" as=\"l\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex;align-items:center;gap:7px\">\n                      <span style=\"width:8px;height:8px;border-radius:2px;background:{{ l.color }};flex-shrink:0\"><\u002Fspan>\n                      <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#3B372F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ l.name }}<\u002Fspan>\n                      <span style=\"margin-left:auto;font:600 11px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ l.amt }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noDonut }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">No carrier data for this period.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n            <div style=\"display:flex;align-items:baseline;margin-bottom:10px\">\n              <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Persistency health<\u002Fdiv>\n              <span style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C;margin-left:auto;white-space:nowrap;padding-left:8px\">Book-wide<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:18px;justify-content:center\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px\">\n                <div style=\"position:relative;width:84px;height:84px\">\n                  <svg width=\"84\" height=\"84\" sc-camel-view-box=\"0 0 96 96\">\n                    <circle cx=\"48\" cy=\"48\" r=\"40\" fill=\"none\" stroke=\"#F0EDE7\" stroke-width=\"8\"><\u002Fcircle>\n                    <circle cx=\"48\" cy=\"48\" r=\"40\" fill=\"none\" stroke=\"#3A73C9\" stroke-width=\"8\" stroke-linecap=\"round\" stroke-dasharray=\"{{ p13Dash }}\" transform=\"rotate(-90 48 48)\"><\u002Fcircle>\n                  <\u002Fsvg>\n                  <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:600 15px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ p13Label }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">13-month<\u002Fdiv>\n                <div style=\"font:400 10.5px 'Spline Sans Mono',monospace;color:#B0A99C\">{{ p13Sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px\">\n                <div style=\"position:relative;width:84px;height:84px\">\n                  <svg width=\"84\" height=\"84\" sc-camel-view-box=\"0 0 96 96\">\n                    <circle cx=\"48\" cy=\"48\" r=\"40\" fill=\"none\" stroke=\"#F0EDE7\" stroke-width=\"8\"><\u002Fcircle>\n                    <circle cx=\"48\" cy=\"48\" r=\"40\" fill=\"none\" stroke=\"#3A73C9\" stroke-width=\"8\" stroke-linecap=\"round\" stroke-dasharray=\"{{ p25Dash }} 9px 0;border-top:1px solid #F0EDE7\">\n                <span style=\"width:8px;height:8px;border-radius:50%;background:{{ f.dot }};flex-shrink:0\"><\u002Fspan>\n                <span style=\"font:500 12.5px 'Spline Sans',sans-serif;color:#0F1D3D\">{{ f.client }}<\u002Fspan>\n                <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">{{ f.meta }}<\u002Fspan>\n                <span style=\"margin-left:auto;font:600 12px 'Spline Sans Mono',monospace;color:#3B372F\">{{ f.days }}<\u002Fspan>\n                <span style=\"font:400 10.5px 'Spline Sans Mono',monospace;color:#B0A99C\">{{ f.when }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noFL }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font:400 12px 'Spline Sans',sans-serif;color:#948C7F;padding:10px 0\">No policies in the free-look window right now.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n      <\u002Fsc-if>\n\n      <!-- ================= LEADER: TEAM ================= -->\n      <sc-if value=\"{{ leaderReal }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:baseline;gap:10px;margin-top:8px\">\n          <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">Team — Reed Financial Group<\u002Fdiv>\n          <span style=\"font:400 11px 'Spline Sans Mono',monospace;color:#B0A99C\">AGENCY CODE REEDFG · {{ teamCount }} agents<\u002Fspan>\n          <span style=\"margin-left:auto;font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#B0A99C\">{{ periodTag }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- Team vs You -->\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px\">\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">AP — you vs team avg<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:8px;margin-top:6px\">\n                <span style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ tvYouAp }}<\u002Fspan>\n                <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">team avg <span style=\"font-family:'Spline Sans Mono',monospace\">{{ tvAvgAp }}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Dials — you vs team avg<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:8px;margin-top:6px\">\n                <span style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ tvYouDials }}<\u002Fspan>\n                <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">team avg <span style=\"font-family:'Spline Sans Mono',monospace\">{{ tvAvgDials }}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#948C7F\">Call-to-close — you vs team<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:8px;margin-top:6px\">\n                <span style=\"font:600 22px 'Spline Sans Mono',monospace;color:#0F1D3D\">{{ tvYouRatio }}<\u002Fspan>\n                <span style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">team-wide <span style=\"font-family:'Spline Sans Mono',monospace\">{{ tvAvgRatio }}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Team table -->\n        <div style=\"background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);overflow:hidden\">\n          <sc-if value=\"{{ notTeamLoading }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:1.7fr 1fr .7fr .9fr 1fr 1fr;align-items:center;height:34px;background:#FAF8F5;padding:0 16px;font:600 10.5px 'Spline Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#948C7F\">\n              <span sc-camel-on-click=\"{{ sortName }}\" style=\"cursor:pointer\">Agent {{ arName }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ sortAp }}\" style=\"cursor:pointer;text-align:right\">AP (period) {{ arAp }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ sortSales }}\" style=\"cursor:pointer;text-align:right\">Sales {{ arSales }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ sortDials }}\" style=\"cursor:pointer;text-align:right\">Total dials {{ arDials }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ sortTime }}\" style=\"cursor:pointer;text-align:right\">Call time {{ arTime }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ sortRatio }}\" style=\"cursor:pointer;text-align:right\">Call-to-close {{ arRatio }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ teamRows }}\" as=\"t\" hint-placeholder-count=\"6\">\n              <div style=\"display:grid;grid-template-columns:1.7fr 1fr .7fr .9fr 1fr 1fr;align-items:center;height:38px;padding:0 16px;border-top:1px solid #F0EDE7;font:400 13px 'Spline Sans',sans-serif;color:#0F1D3D\" style-hover=\"background:#FAF8F5\">\n                <span style=\"font-weight:500;display:flex;align-items:center;gap:8px\">{{ t.name }}<sc-if value=\"{{ t.you }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:600 10.5px 'Spline Sans',sans-serif;color:#2A5599;background:#E7EFFB;padding:1px 6px;border-radius:6px\">You<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace;font-weight:600\">{{ t.ap }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ t.sales }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ t.dials }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace;color:#6B6459\">{{ t.time }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace;color:#6B6459\">{{ t.ratio }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"display:grid;grid-template-columns:1.7fr 1fr .7fr .9fr 1fr 1fr;align-items:center;height:38px;padding:0 16px;border-top:1px solid #E4E0DA;background:#FAF8F5;font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D\">\n              <span>Team total<\u002Fspan>\n              <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ tTotAp }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ tTotSales }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ tTotDials }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ tTotTime }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'Spline Sans Mono',monospace\">{{ tTotRatio }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ teamLoadingOn }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:14px 16px;display:flex;flex-direction:column;gap:10px\">\n              <div style=\"height:12px;width:38%;background:#ECE9E3;border-radius:6px;animation:ps-pulse 1.4s ease-in-out infinite\"><\u002Fdiv>\n              <div style=\"height:12px;width:92%;background:#F0EDE7;border-radius:6px;animation:ps-pulse 1.4s ease-in-out infinite\"><\u002Fdiv>\n              <div style=\"height:12px;width:88%;background:#F0EDE7;border-radius:6px;animation:ps-pulse 1.4s ease-in-out infinite\"><\u002Fdiv>\n              <div style=\"height:12px;width:90%;background:#F0EDE7;border-radius:6px;animation:ps-pulse 1.4s ease-in-out infinite\"><\u002Fdiv>\n              <div style=\"height:12px;width:84%;background:#F0EDE7;border-radius:6px;animation:ps-pulse 1.4s ease-in-out infinite\"><\u002Fdiv>\n              <div style=\"font:400 11.5px 'Spline Sans',sans-serif;color:#948C7F\">Loading team aggregates — your personal stats above are already live.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"font:400 10.5px 'Spline Sans',sans-serif;color:#B0A99C;margin-top:-6px\">Downline rows show production and calling totals only — no client names, policy details, or commission amounts.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ================= TEASERS ================= -->\n      <sc-if value=\"{{ basicOnly }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <sc-for list=\"{{ proTeasers }}\" as=\"tz\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative;background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px;min-height:172px;box-sizing:border-box\">\n              <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D;margin-bottom:12px\">{{ tz.title }}<\u002Fdiv>\n              <div style=\"filter:blur(3px);opacity:.55;pointer-events:none;display:flex;flex-direction:column;gap:10px\">\n                <div style=\"height:20px;width:38%;background:#ECE9E3;border-radius:6px\"><\u002Fdiv>\n                <div style=\"height:9px;width:92%;background:#F0EDE7;border-radius:6px\"><\u002Fdiv>\n                <div style=\"height:9px;width:76%;background:#F0EDE7;border-radius:6px\"><\u002Fdiv>\n                <div style=\"display:flex;gap:8px;align-items:flex-end;height:44px\">\n                  <div style=\"flex:1;height:20px;background:#ECE9E3;border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:34px;background:#ECE9E3;border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:26px;background:#ECE9E3;border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:42px;background:#ECE9E3;border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:30px;background:#ECE9E3;border-radius:3px 3px 0 0\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:rgba(255,255,255,.55);border-radius:6px\">\n                <span style=\"font:600 11px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#2A5599;background:#E7EFFB;border:1px solid #B8CCEE;padding:2px 8px;border-radius:6px\">Pro<\u002Fspan>\n                <div style=\"font:400 12.5px 'Spline Sans',sans-serif;color:#3B372F;text-align:center;max-width:280px\">{{ tz.desc }}<\u002Fdiv>\n                <button style=\"background:#3A73C9;color:#FFFFFF;border:none;border-radius:6px;font:600 12.5px 'Spline Sans',sans-serif;padding:7px 12px;cursor:pointer\" style-hover=\"background:#2A5599\">Upgrade to Pro<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ teamTeaserShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative;background:#FFFFFF;border:1px solid #E4E0DA;border-radius:6px;box-shadow:0 1px 2px rgba(15,29,61,.05);padding:14px 16px;min-height:180px;box-sizing:border-box\">\n          <div style=\"font:600 13px 'Spline Sans',sans-serif;color:#0F1D3D;margin-bottom:12px\">Team summary<\u002Fdiv>\n          <div style=\"filter:blur(3px);opacity:.55;pointer-events:none;display:flex;flex-direction:column;gap:9px\">\n            <div style=\"height:12px;width:32%;background:#ECE9E3;border-radius:6px\"><\u002Fdiv>\n            <div style=\"height:11px;width:94%;background:#F0EDE7;border-radius:6px\"><\u002Fdiv>\n            <div style=\"height:11px;width:90%;background:#F0EDE7;border-radius:6px\"><\u002Fdiv>\n            <div style=\"height:11px;width:92%;background:#F0EDE7;border-radius:6px\"><\u002Fdiv>\n            <div style=\"height:11px;width:86%;background:#F0EDE7;border-radius:6px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:rgba(255,255,255,.55);border-radius:6px\">\n            <span style=\"font:600 11px 'Spline Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#2A5599;background:#E7EFFB;border:1px solid #B8CCEE;padding:2px 8px;border-radius:6px\">Team Leader<\u002Fspan>\n            <div style=\"font:400 12.5px 'Spline Sans',sans-serif;color:#3B372F;text-align:center;max-width:340px\">See every downline agent's AP, sales, dials, call time, and call-to-close beside your own.<\u002Fdiv>\n            <button style=\"background:#3A73C9;color:#FFFFFF;border:none;border-radius:6px;font:600 12.5px 'Spline Sans',sans-serif;padding:7px 12px;cursor:pointer\" style-hover=\"background:#2A5599\">Upgrade to Team Leader<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font:400 10.5px 'Spline Sans',sans-serif;color:#B0A99C;padding-bottom:8px\">All metrics derive from your entered policies, leads, and dialer activity. Estimates marked \"est.\" are subject to carrier persistency and quality requirements.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440}, &quot;tier&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;basic&quot;, &quot;pro&quot;, &quot;leader&quot;], &quot;default&quot;: &quot;leader&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Plan tier&quot;}, &quot;newAgent&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Data states&quot;}, &quot;teamLoading&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Data states&quot;}, &quot;monthlyGoal&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 50000, &quot;min&quot;: 5000, &quot;max&quot;: 250000, &quot;step&quot;: 5000, &quot;unit&quot;: &quot;$&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Data states&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    let per = 'monthly';\n    try { const v = localStorage.getItem('pp_summary_period_ledger'); if (['daily','weekly','monthly'].includes(v)) per = v; } catch(e){}\n    this.state = { period: per, sortCol: 'ap', sortDir: 'desc' };\n  }\n  _rng(seed){ let t = seed>>>0; return function(){ t += 0x6D2B79F5; let r = Math.imul(t ^ (t>>>15), 1|t); r ^= r + Math.imul(r ^ (r>>>7), 61|r); return ((r ^ (r>>>14))>>>0)/4294967296; }; }\n  _setPeriod(p){ try { localStorage.setItem('pp_summary_period_ledger', p); } catch(e){} this.setState({ period: p }); }\n  _sortBy(col){ this.setState(s => ({ sortCol: col, sortDir: s.sortCol === col ? (s.sortDir === 'desc' ? 'asc' : 'desc') : 'desc' })); }\n  _f$(n){ return '$' + Math.round(n).toLocaleString('en-US'); }\n  _fdur(s){ const h = Math.floor(s/3600), m = Math.round((s%3600)/60); return h ? (h + 'h ' + m + 'm') : (m + 'm'); }\n  _fd(d){ return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }\n\n  _genAgent(seed, factor, isYou){\n    const r = this._rng(seed);\n    const now = new Date();\n    const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());\n    const D = 864e5;\n    const days = [];\n    for (let i = 0; i < 90; i++){\n      const d = new Date(t0); d.setDate(d.getDate() - i);\n      const dow = d.getDay();\n      let base = dow === 0 ? 0 : dow === 6 ? (r() < .5 ? 0 : 8 + r()*14) : (r() < .07 ? 0 : 30 + r()*36);\n      base *= factor;\n      if (i === 0) base *= Math.min(1, Math.max(.3, now.getHours()/22));\n      const dials = Math.round(base);\n      const contacts = Math.min(dials, Math.round(dials * (.2 + r()*.13)));\n      const talk = Math.round(contacts * (150 + r()*260) + (dials - contacts) * 4);\n      days.push({ t: d.getTime(), dials, contacts, talk });\n    }\n    const CAR = [['Americo',.28],['Mutual of Omaha',.24],['Transamerica',.18],['Corebridge',.12],['American-Amicable',.10],['GTL',.08]];\n    const SRC = [['Facebook — FE',.34],['Direct Mail',.22],['Aged Internet',.18],['Referral',.14],['Telemarketed',.12]];\n    const FIRST = ['Roberta','Earl','Gladys','Vernon','Doris','Hal','Marlene','Otis','June','Curtis','Wanda','Lloyd','Bessie','Ray','Thelma','Gene','Opal','Frank','Ida','Walt'];\n    const LAST = ['Mabry','Tillman','Prewitt','Sandoval','Kirkland','Boggs','Hutto','Ferris','McElroy','Stackhouse','Duval','Pruitt','Ledbetter','Ojeda','Carmack','Hollis','Vance','Truett','Amos','Whitaker'];\n    const pick = list => { const x = r(); let acc = 0; for (const [n, w] of list){ acc += w; if (x < acc) return n; } return list[0][0]; };\n    const prodFor = car => {\n      if (car === 'Transamerica') return r() < .4 ? ['Trendsetter Super','TERM'] : ['Express Solution','FE'];\n      if (car === 'GTL') return ['Turbo Term','TERM'];\n      if (car === 'Corebridge') return ['SIWL','WL'];\n      if (car === 'Mutual of Omaha') return r() < .2 ? ['IUL Express','IUL'] : ['Living Promise','FE'];\n      if (car === 'American-Amicable') return ['Senior Choice','FE'];\n      return ['Eagle Select','FE'];\n    };\n    const mk = (sub, forced) => {\n      const carrier = pick(CAR);\n      const pp = prodFor(carrier);\n      const monthly = Math.round(40 + r()*130);\n      const ap = monthly * 12;\n      const commPct = Math.round(95 + r()*25);\n      const advComm = Math.round(ap * commPct/100 * .75);\n      const age = (now - sub)/D;\n      let status = forced || null;\n      if (!status){\n        const x = r();\n        if (age < 12) status = x < .5 ? 'pending' : x < .75 ? 'approved' : 'issued';\n        else if (age < 45) status = x < .2 ? 'pending' : x < .38 ? 'approved' : x < .62 ? 'issued' : x < .9 ? 'paid' : 'lapsed';\n        else status = x < .76 ? 'paid' : x < .88 ? 'issued' : 'lapsed';\n      }\n      let issue = null, paid = null;\n      if (status === 'issued' || status === 'paid' || (status === 'lapsed' && age > 30)){\n        issue = new Date(sub.getTime() + (8 + r()*22)*D);\n        if (issue > now) issue = new Date(now.getTime() - r()*4*D);\n      }\n      if (status === 'paid' && issue){\n        paid = new Date(issue.getTime() + (5 + r()*18)*D);\n        if (paid > now) paid = new Date(now.getTime() - 3600e3);\n      }\n      return { client: FIRST[Math.floor(r()*20)] + ' ' + LAST[Math.floor(r()*20)], carrier, product: pp[0], ptype: pp[1], monthly, ap, commPct, advComm, status, sub, issue, paid, source: pick(SRC), conv: null };\n    };\n    const pols = [];\n    const n = Math.round(150 * factor);\n    for (let j = 0; j < n; j++){\n      const mb = Math.floor(Math.pow(r(), 1.6) * 26);\n      let sub = new Date(now.getFullYear(), now.getMonth() - mb, 1 + Math.floor(r()*28), 10);\n      if (sub > now) sub = new Date(now.getTime() - Math.floor(r()*9 + 1)*D);\n      pols.push(mk(sub));\n    }\n    if (isYou){\n      pols.push(mk(new Date(t0.getTime() + 9*3600e3), 'pending'));\n      pols.push(mk(new Date(t0.getTime() + 11.5*3600e3), 'pending'));\n      const dowNow = (t0.getDay() + 6) % 7;\n      for (let q = 1; q <= Math.min(3, dowNow); q++) pols.push(mk(new Date(t0.getTime() - q*D + 13*3600e3)));\n      [4, 11, 23].forEach(dd => {\n        const p = mk(new Date(now.getTime() - (dd + 16)*D), dd > 15 ? 'paid' : 'issued');\n        p.issue = new Date(now.getTime() - dd*D);\n        pols.push(p);\n      });\n      [21, 44, 62, 81].forEach(dd => {\n        const p = mk(new Date(now.getFullYear() - 3, now.getMonth(), 5 + Math.floor(r()*20), 10), 'paid');\n        p.carrier = 'Transamerica'; p.product = 'Trendsetter Super'; p.ptype = 'TERM';\n        p.conv = new Date(now.getTime() + dd*D);\n        pols.push(p);\n      });\n    }\n    return { days, pols };\n  }\n  _agents(){\n    if (this.__ag) return this.__ag;\n    const list = [\n      { name: 'Marcus Reed', you: true, factor: 1, seed: 11 },\n      { name: 'Dana Whitfield', factor: .85, seed: 23 },\n      { name: 'Jerome Okafor', factor: .68, seed: 37 },\n      { name: 'Casey Nguyen', factor: .52, seed: 49 },\n      { name: 'Priya Raman', factor: .38, seed: 61 },\n      { name: 'Tom Delgado', factor: .22, seed: 73 }\n    ];\n    this.__ag = list.map(a => Object.assign({}, a, this._genAgent(a.seed, a.factor, !!a.you)));\n    return this.__ag;\n  }\n  _range(period){\n    const now = new Date();\n    const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());\n    if (period === 'daily') return { start: t0, end: now };\n    if (period === 'weekly'){ const s = new Date(t0); s.setDate(s.getDate() - ((t0.getDay() + 6) % 7)); return { start: s, end: now }; }\n    return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: now };\n  }\n  _agg(a, rg){\n    let dials = 0, contacts = 0, talk = 0;\n    for (const d of a.days){ if (d.t >= rg.start.getTime() && d.t <= rg.end.getTime()){ dials += d.dials; contacts += d.contacts; talk += d.talk; } }\n    const sold = a.pols.filter(p => p.sub >= rg.start && p.sub <= rg.end && p.status !== 'lapsed' && p.status !== 'chargeback');\n    return { dials, contacts, talk, sales: sold.le 0 });\n    const ar = c => this.state.sortCol === c ? (this.state.sortDir === 'desc' ? '▾' : '▴') : '';\n    const nTeam = agents.length;\n    const oAvg = k => tot[k]/nTeam;\n\n    const proTeasers = [\n      { title: 'Income reality', desc: 'Net commission, chargeback exposure, and your 12-month renewal projection.' },\n      { title: 'Chargeback earn-down', desc: 'Watch at-risk advance dollars clear month by month over the 9-month window.' },\n      { title: 'Pipeline funnel', desc: 'Submitted → paid with placement %, so you see exactly where deals stall.' },\n      { title: 'Carrier mix & persistency', desc: '13/25-month persistency, product mix, and carrier concentration alerts.' },\n      { title: 'Bonus tier intelligence', desc: 'Every active program, your gap to the next tier, and est. payouts coming.' },\n      { title: 'Lead-source ROI', desc: 'Leads, conversion %, AP, and est. commission for every lead source you buy.' }\n    ];\n\n    return {\n      // shell\n      tierLabel: tier === 'leader' ? 'Team Leader' : tier === 'pro' ? 'Pro Producer' : 'Basic',\n      todayLabel: now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }),\n      // toolbar\n      setDaily: () => this._setPeriod('daily'), setWeekly: () => this._setPeriod('weekly'), setMonthly: () => this._setPeriod('monthly'),\n      cDb, cDc, cWb, cWc, cMb, cMc, periodCaption, periodTag,\n      // kpis + calling\n      kPolicies, kAP, kComm, kAvgPrem, dials: String(A.dials), callTime: A.talk ? fdur(A.talk) : '0m', contacts: String(A.contacts), contactRate, ratioBig, ratioSub,\n      // goal\n      goalDash: (goalPct*351.86).toFixed(1) + ' 351.86', goalPctLabel: Math.round(goalPct*100) + '%', goalAPLabel: f$(MA.ap), goalTargetLabel: f$(goal), goalDays: String(goalDaysLeft), goalNeed: goalNeed,\n      // status + top carriers\n      hasStatus: totalC > 0, noStatus: totalC === 0, statusSegs, statusPills,\n      hasTop: topCarriers.length > 0, noTop: topCarriers.length === 0, topCarriers,\n      // income reality\n      irNet: (net < 0 ? '−' : '') + f$(Math.abs(net)), irNetColor: net < 0 ? '#B3261E' : '#0F1D3D', irEarned: f$(earned), irExposed: f$(exposed), irRenewal: 'est. ' + f$(inForce*.05), irInForce: f$(inForce), irAtRisk: String(atRisk.length),\n      // earn-down\n      hasED: exposed > 0, noED: exposed === 0, edBars, edTotal: f$(exposed),\n      // funnel\n      hasFunnel: totalC > 0, noFunnel: totalC === 0, funnelSegs, placement,\n      // donut\n      hasDonut: A.ap > 0, noDonut: A.ap === 0, donutSegs, donutTotal, donutLegend,\n      // persistency\n      p13Dash: r13.dash, p13Label: r13.label, p13Sub: r13.sub, p25Dash: r25.dash, p25Label: r25.label, p25Sub: r25.sub,\n      // mix\n      mixRows, concWarn, concOk: !concWarn, concText,\n      // momentum\n      amRows, streakCur: String(streakCur), streakLong: String(streakLong), streakDays: String(dayset.size),\n      achieves,\n      // bonus\n      ladders, nearest, hasNearest: nearest.length > 0, bonusEmpty: nearest.length === 0, upcoming, hasUpcoming: upcoming.length > 0, noUpcoming: upcoming.length === 0,\n      // roi + cycle\n      hasROI: roiRows.length > 0, noROI: roiRows.length === 0, roiRows,\n      hasCycle: cycleRows.length > 0, noCycle: cycleRows.length === 0, cycleRows,\n      // free look + eff + radar\n      hasFL: flRows.length > 0, noFL: flRows.length === 0, flRows,\n      perDial, perContact,\n      hasRadar: radarPols.length > 0, noRadar: radarPols.length === 0, radarCount: String(radarPols.length), radarAP: f$(radarAPv),\n      // team\n      teamCount: String(nTeam),\n      teamRows, tTotAp: f$(tot.ap), tTotSales: String(tot.sales), tTotDials: String(tot.dials), tTotTime: fdur(tot.talk), tTotRatio: tot.sales > 0 ? Math.max(1, Math.round(tot.dials/tot.sales)) + ':1' : '—',\n      sortName: () => this._sortBy('name'), sortAp: () => this._sortBy('ap'), sortSales: () => this._sortBy('sales'), sortDials: () => this._sortBy('dials'), sortTime: () => this._sortBy('time'), sortRatio: () => this._sortBy('ratio'),\n      arName: ar('name'), arAp: ar('ap'), arSales: ar('sales'), arDials: ar('dials'), arTime: ar('time'), arRatio: ar('ratio'),\n      tvYouAp: f$(tAgg[0].ap), tvAvgAp: f$(oAvg('ap')), tvYouDials: String(tAgg[0].dials), tvAvgDials: String(Math.round(oAvg('dials'))), tvYouRatio: ratioBig, tvAvgRatio: tot.sales > 0 ? Math.max(1, Math.round(tot.dials/tot.sales)) + ':1' : '—',\n      // gating\n      proReal: tier === 'pro' || tier === 'leader',\n      leaderReal: tier === 'leader',\n      basicOnly: tier === 'basic',\n      teamTeaserShow: tier !== 'leader',\n      notTeamLoading: !teamLoading,\n      teamLoadingOn: teamLoading,\n      proTeasers\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
