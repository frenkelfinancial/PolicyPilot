workflows:
  ios-app-store:
    name: iOS App Store build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: producer-stack-api-key # must match the API key name you add in Codemagic Teams > Integrations
    environment:
      xcode: latest
      node: 20
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.policypilot.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync web assets into iOS project
        script: npm run cap:sync
      - name: Install CocoaPods dependencies
        script: cd ios/App && pod install
      - name: Set build number
        script: cd ios/App && agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build signed IPA
        script: xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
